#!/usr/sbin/nft -f
# ======================================================= #
#                 📝 nftables 端口转发脚本                #
# ======================================================= #

# =======================================================
# 01. 公共配置
define RELAY_LAN_IP  = 1.1.1.1   # 定义转发服务器 IP，用于 SNAT 出站伪装
# =======================================================

# =======================================================
# 02. 线路配置
# 【线路 1】【RFC JP T1】
define PORT_IN_1     = 12345     # 中转端口 1，服务器监听端口
define DEST_IP_1     = 2.2.2.1   # 1号落地机
define DEST_PORT_1   = 12345     # 1号落地机端口

# 【线路 2】【RFC JP CO】
define PORT_IN_2     = 12346     # 中转端口 2，服务器监听端口
define DEST_IP_2     = 2.2.2.2   # 2号落地机 IP
define DEST_PORT_2   = 12346     # 2号落地机端口

# 【线路 3】【Po0 HK T1】
define PORT_IN_3     = 12347     # 中转端口 3，服务器监听端口
define DEST_IP_3     = 2.2.2.3   # 3号落地机 IP
define DEST_PORT_3   = 12347     # 3号落地机端口
# =======================================================

# =======================================================
# 03. 清空旧规则
flush ruleset                      # 清空 nftables 规则集，避免旧规则冲突
# =======================================================

# =======================================================
# 04. 核心转发逻辑（NAT 表）
table ip nat {
    # --- 入站转发 (DNAT) ---
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;   # 设置链类型为 NAT prerouting，优先级 dstnat，默认接受

        # [线路 1] 流量进入 $PORT_IN_1 端口 -> 转发到 $DEST_IP_1:$DEST_PORT_1
        meta l4proto { tcp, udp } th dport $PORT_IN_1 dnat to $DEST_IP_1:$DEST_PORT_1

        # [线路 2] 流量进入 $PORT_IN_2 端口 -> 转发到 $DEST_IP_2:$DEST_PORT_2
        meta l4proto { tcp, udp } th dport $PORT_IN_2 dnat to $DEST_IP_2:$DEST_PORT_2

        # [线路 3] 流量进入 $PORT_IN_3 端口 -> 转发到 $DEST_IP_3:$DEST_PORT_3
        meta l4proto { tcp, udp } th dport $PORT_IN_3 dnat to $DEST_IP_3:$DEST_PORT_3
    }

    # --- 出站伪装 (SNAT) ---
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;   # 设置链类型为 NAT postrouting，优先级 srcnat，默认接受

        # [线路 1] 发往 $DEST_IP_1:$DEST_PORT_1 的流量 -> 改源 IP 为 $RELAY_LAN_IP
        ip daddr $DEST_IP_1 meta l4proto { tcp, udp } th dport $DEST_PORT_1 snat to $RELAY_LAN_IP

        # [线路 2] 发往 $DEST_IP_2:$DEST_PORT_2 的流量 -> 改源 IP 为 $RELAY_LAN_IP
        ip daddr $DEST_IP_2 meta l4proto { tcp, udp } th dport $DEST_PORT_2 snat to $RELAY_LAN_IP

        # [线路 3] 发往 $DEST_IP_3:$DEST_PORT_3 的流量 -> 改源 IP 为 $RELAY_LAN_IP
        ip daddr $DEST_IP_3 meta l4proto { tcp, udp } th dport $DEST_PORT_3 snat to $RELAY_LAN_IP
    }
}
# =======================================================

# =======================================================
# 05. 性能优化逻辑（Filter 表）
# 目的: 防止 MTU 不匹配导致的断流
table ip filter {
    chain forward {
        type filter hook forward priority 0; policy accept;  # 转发链，默认允许流量通过

        # 调整 TCP MSS，解决特定情况下速度慢或断流问题
        # 仅对目标 IP 为 $DEST_IP_1、$DEST_IP_2、$DEST_IP_3 的 SYN 包生效
        ip daddr { $DEST_IP_1, $DEST_IP_2, $DEST_IP_3 } tcp flags syn tcp option maxseg size set 1452
    }
}
# =======================================================
